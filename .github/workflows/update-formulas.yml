name: update-formulas

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        formula:
          - docker-container-healthchecker
          - docker-orchestrate
          - docker-port-forward
          - docker-run-export
          - docket
          - dokku
          - lambda-builder
          - netrc
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout
        uses: actions/checkout@v6

      - name: Tap repo
        run: |
          mkdir -p $(dirname $(brew --repo dokku/repo))
          ln -s $PWD $(brew --repo dokku/repo)

      - name: Update formula
        id: update
        run: |
          brew livecheck dokku/repo/${{ matrix.formula }} --json | jq -r '.[0].version.latest' > /tmp/version
          VERSION=$(cat /tmp/version)
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          brew bump-formula-pr dokku/repo/${{ matrix.formula }} --no-browse --no-fork --version=$VERSION --base master
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize version stanza on bot branch
        if: success()
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$BRANCH" = "master" ] || [ "$BRANCH" = "HEAD" ]; then
            echo "Not on a bot branch (current: $BRANCH); nothing to sanitize."
            exit 0
          fi

          FILE="Formula/${{ matrix.formula }}.rb"
          if ! grep -qE '^  version "v' "$FILE"; then
            echo "No stray v prefix in $FILE; nothing to sanitize."
            exit 0
          fi

          sed -i '' -E 's/^(  version ")v/\1/' "$FILE"
          git add "$FILE"
          git commit --amend --no-edit
          git push --force-with-lease origin "$BRANCH"
